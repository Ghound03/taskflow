{% extends 'base.html' %}

{% load static %}

{% block content %}

<section class="hero">

    <div class="hero-content">

        <div class="hero-text">

            <h1>TaskFlow</h1>

            <h2>Manage Your Tasks Efficiently</h2>

            <p>
                Organize your work, track progress,
                and stay productive with TaskFlow.
            </p>

            {% if user.is_authenticated %}

                <a class="button" href="{% url 'dashboard' %}">
                    Go To Dashboard
                </a>

            {% else %}

                <a class="button" href="{% url 'register' %}">
                    Get Started
                </a>

            {% endif %}

        </div>

        <div class="hero-image">

            <img
                src="{% static 'images/task-management.svg' %}"
                alt="Task Management Illustration"
            >

        </div>

    </div>

</section>

{% endblock %}
